apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-translate-service
  labels:
    app: cortex-translate-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cortex-translate-service
  template:
    metadata:
      labels:
        app: cortex-translate-service
    spec:
      containers:
      - name: cortex-translate-service
        image: ghcr.io/seongho-bae/snowflake-cortex-translate:latest
        ports:
        - containerPort: 8000
        env:
        - name: PORT
          value: "8000"
        securityContext:
          runAsNonRoot: true
          readOnlyRootFilesystem: true
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
