name: OSSF Scorecard

on:
  branch_protection_rule:
  push:
    branches:
      - main
  schedule:
    - cron: "11 4 * * 2"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  scorecard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      scorecard-step-outcome: ${{ steps.scorecard.outcome }}
      sarif-artifact-outcome: ${{ steps.scorecard_artifact.outcome }}
    permissions:
      contents: read
      actions: read
      security-events: write
      id-token: write

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Run OSSF Scorecard
        id: scorecard
        continue-on-error: true
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true

      - name: Upload Scorecard SARIF
        if: always() && hashFiles('results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        with:
          sarif_file: results.sarif

      - name: Upload Scorecard artifact
        id: scorecard_artifact
        if: always() && hashFiles('results.sarif') != ''
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ossf-scorecard-sarif
          path: results.sarif
          if-no-files-found: error

  scorecard-report:
    if: always()
    needs: scorecard
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      actions: read

    steps:
      - name: Summarize Scorecard publication status
        shell: bash
        run: |
          {
            echo "## OSSF Scorecard"
            echo ""
            echo "- API: https://api.scorecard.dev/projects/github.com/Seongho-Bae/snowflake-cortex-translate"
            echo "- Viewer: https://scorecard.dev/viewer/?uri=github.com/Seongho-Bae/snowflake-cortex-translate"
            echo ""
            if [ "${{ needs.scorecard.outputs.scorecard-step-outcome }}" != "success" ]; then
              echo "The publishable Scorecard step did not complete successfully. Inspect the scorecard job logs before trusting the public API/viewer state."
            elif [ "${{ needs.scorecard.outputs.sarif-artifact-outcome }}" != "success" ]; then
              echo "The publishable Scorecard step completed, but it did not leave a SARIF artifact for upload. Recheck the action log before trusting the public API/viewer state."
            elif [ "${{ needs.scorecard.result }}" = "success" ]; then
              echo "The publishable Scorecard job completed. If the public API still shows 404, wait for ingestion and recheck the API/viewer."
            else
              echo "The publishable Scorecard job did not complete successfully. Inspect the scorecard job logs before trusting the public API/viewer state."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
